<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Azure Lab</title>
    <style>
        /* Modern Reset & Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0078d4 0%, #001f3f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* Glassmorphism Card */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: #0078d4; /* Azure Blue */
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
        }

        .divider {
            height: 2px;
            background: #eee;
            margin: 2rem 0;
        }

        .info {
            font-weight: 600;
            color: #222;
        }

        .tag {
            display: inline-block;
            background: #e1f0ff;
            color: #0078d4;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello, Azure!</h1>
        <p>This site was deployed using <br><strong>Azure Static Web Apps</strong></p>
        <span class="tag">Free Tier</span>

        <div class="divider"></div>

        <p class="info">Developed by:</p>
        <p style="margin: 5px 0;">[Your Name]</p>
        <p style="font-style: italic; color: #777;">[Your University Name]</p>
    </div>

</body>
</html>
